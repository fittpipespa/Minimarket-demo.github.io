<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MiniMarket Express</title>

  <link rel="stylesheet" href="styles.css">
</head>

<body>

<header>
  <div class="navbar">
    <div class="logo">MiniMarket</div>
    <ul class="nav-links">
      <li><a href="#productos">Productos</a></li>
    </ul>
  </div>
</header>

<section class="hero">
  <div class="hero-text">
    <h1>MiniMarket Express</h1>
    <p>Compra fácil y rápido desde tu celular.</p>
   <p><a class="btn" href="https://wa.me/56948713517" target="_blank">WhatsApp</a></p>
  </div>
</section>

<section class="productos" id="productos">
  <h2 class="section-title">Productos</h2>

  <div class="grid-productos">

    <div class="card">
      <h3>Papas Fritas</h3>
      <span class="precio">$1.490</span>
      <button onclick="agregar('Papas Fritas',1490)">Agregar</button>
    </div>

    <div class="card">
      <h3>Bebida</h3>
      <span class="precio">$2.290</span>
      <button onclick="agregar('Bebida',2290)">Agregar</button>
    </div>

  </div>
</section>

<!-- Carrito -->
<div class="carrito" id="carrito" style="display:none;">
  <h3>🛒 Carrito</h3>
  <div id="items"></div>
  <div class="total" id="total">Total: $0</div>
  <button onclick="enviar()" class="carrito-btn">Enviar pedido</button>
</div>

<div class="contador" onclick="toggleCarrito()">
  🛒 <span id="count">0</span>
</div>

<script src="script.js"></script>

</body>
</html>
